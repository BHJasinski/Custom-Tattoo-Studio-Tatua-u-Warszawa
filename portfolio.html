<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PORTFOLIO VIDEO | CUSTOM TATTOO</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@400;700;900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #07060D;
            --neon-cyan: #00E5FF;
            --neon-magenta: #FF2BD6;
            --neon-violet: #7C3CFF;
            --text-main: #F4F1FF;
            --dna-gradient: linear-gradient(135deg, #FF2BD6 0%, #7C3CFF 45%, #00E5FF 100%);
            --glass-bg: rgba(18, 11, 42, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .bg-elements {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 20% 30%, rgba(124, 60, 255, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(255, 43, 214, 0.1) 0%, transparent 50%);
        }

        header {
            padding: 20px;
            display: flex;
            justify-content: center;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(7, 6, 13, 0.8);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        /* Duży, czytelny przycisk powrotu */
        .back-btn {
            font-family: 'Orbitron', sans-serif;
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 2px;
            padding: 15px 30px;
            border: 1px solid var(--neon-cyan);
            border-radius: 5px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(0, 229, 255, 0.05);
        }

        .back-btn:hover {
            background: var(--neon-cyan);
            color: var(--bg-deep);
            box-shadow: 0 0 25px var(--neon-cyan);
        }

        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .video-title {
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            margin-bottom: 30px;
            font-size: clamp(1.2rem, 5vw, 2rem);
            text-transform: uppercase;
            letter-spacing: 4px;
            background: var(--dna-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Ramka 9:16 */
        .neon-cinema-frame {
            position: relative;
            width: 100%;
            max-width: 400px; /* Optymalna szerokość dla filmu pionowego */
            background: #000;
            padding: 8px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(124, 60, 255, 0.2);
            border: 1px solid var(--glass-border);
            overflow: hidden;
            animation: cyber-glow 4s infinite alternate ease-in-out;
        }

        @keyframes cyber-glow {
            0% { border-color: var(--neon-cyan); box-shadow: 0 0 20px rgba(0, 229, 255, 0.2); }
            100% { border-color: var(--neon-magenta); box-shadow: 0 0 40px rgba(255, 43, 214, 0.3); }
        }

        .video-aspect-ratio {
            position: relative;
            padding-bottom: 177.77%; /* Proporcje 9:16 */
            height: 0;
            overflow: hidden;
            border-radius: 12px;
        }

        .video-aspect-ratio iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none;
        }

        .status-bar {
            margin-top: 25px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.7rem;
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            gap: 20px;
            opacity: 0.8;
            background: rgba(255,255,255,0.05);
            padding: 10px 20px;
            border-radius: 50px;
        }

        @media (max-width: 768px) {
            .neon-cinema-frame {
                max-width: 85vw;
            }
            .status-bar { 
                flex-direction: column; 
                text-align: center; 
                gap: 8px; 
                border-radius: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="bg-elements"></div>

    <header>
        <a href="index.html" class="back-btn">
            <span>←</span> POWRÓT DO LABU
        </a>
    </header>

    <main>
        <h1 class="video-title">Visual Experience</h1>
        
        <div class="neon-cinema-frame">
            <div class="video-aspect-ratio">
                <iframe src="https://streamable.com/e/3ttsgo?autoplay=1&muted=1&loop=1" 
                        allow="autoplay; fullscreen" 
                        allowfullscreen>
                </iframe>
            </div>
        </div>

        <div class="status-bar">
            <span>● STATUS: STREAMING</span>
            <span>● MODE: 9:16_VERTICAL</span>
            <span>● STUDIO: CUSTOM_TATTOO</span>
        </div>
    </main>

</body>
</html>
